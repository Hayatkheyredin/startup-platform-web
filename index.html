<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Women Startup Platform</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div id="loading-msg" style="padding: 2rem; font-family: sans-serif; text-align: center; color: #333;">
        Loading Women Startup Platform...
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // If React hasn't mounted after 3 seconds, show debug info
      setTimeout(function() {
        var root = document.getElementById('root');
        var loading = document.getElementById('loading-msg');
        if (loading && loading.parentNode === root) {
          root.innerHTML = '<div style="padding: 2rem; font-family: sans-serif; max-width: 600px; margin: 0 auto;">' +
            '<h2 style="color: #c00;">App failed to load</h2>' +
            '<p>React did not mount. Open DevTools (F12) → Console to see errors.</p>' +
            '<p>Common fixes: Restart dev server (<code>npm run dev</code>), hard refresh (Ctrl+Shift+R).</p>' +
            '</div>';
        }
      }, 3000);
    </script>
  </body>
</html>
