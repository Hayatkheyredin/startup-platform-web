<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Women Startup Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="loading-msg" class="flex items-center justify-center min-h-screen text-text font-sans">
        Loading Women Startup Platform...
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        var loading = document.getElementById('loading-msg');
        if (loading && loading.parentNode === root) {
          root.innerHTML = '<div class="p-8 font-sans max-w-lg mx-auto text-center"><h2 class="text-red-600 text-xl font-semibold">App failed to load</h2><p class="text-text mt-2">Open DevTools (F12) → Console for errors.</p></div>';
        }
      }, 3000);
    </script>
  </body>
</html>
